# 最小 CI: DB 不要の unit のみ（毎回）。integration / staging は docs/qa/automated-test-baseline.md 参照。
name: CI

on:
  push:
    branches: [main, master, staging]
  pull_request:
    branches: [main, master, staging]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run test:unit
